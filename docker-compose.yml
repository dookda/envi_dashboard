version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: envi_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: envi_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d envi_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  mock-service:
    build: ./mock-service
    container_name: envi_mock_service
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/envi_db
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./web
    container_name: envi_web
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/envi_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
